<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trump Trading — Live Market Intelligence</title>
<style>
  :root {
    --bg: #0B0F14;
    --surface: #121821;
    --surface2: #1A2230;
    --border: #243044;
    --critical: #E53935;
    --high: #FB8C00;
    --medium: #FDD835;
    --low: #66BB6A;
    --accent: #3D8BFD;
    --text: #E6EBF2;
    --text2: #8A97A8;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    background: var(--bg); color: var(--text);
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    min-height: 100vh; padding-bottom: 70px;
  }
  a { color: inherit; text-decoration: none; }

  /* Header */
  header {
    background: var(--surface); border-bottom: 1px solid var(--border);
    padding: 12px 18px; display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
  }
  .logo { display: flex; align-items: center; gap: 10px; }
  .logo-icon {
    width: 34px; height: 34px; background: var(--accent); border-radius: 8px;
    display: flex; align-items: center; justify-content: center; font-size: 17px; font-weight: 900; color: #fff;
  }
  .logo-text { font-size: 16px; font-weight: 700; letter-spacing: .3px; }
  .logo-sub { font-size: 10px; color: var(--text2); }
  .live-badge {
    display: flex; align-items: center; gap: 6px; background: rgba(229,57,53,.15);
    border: 1px solid var(--critical); color: var(--critical); border-radius: 20px;
    padding: 4px 11px; font-size: 11px; font-weight: 700; letter-spacing: 1px;
  }
  .live-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--critical); animation: pulse 1.2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.25} }

  /* Refresh status bar */
  .refresh-bar {
    background: var(--surface2); border-bottom: 1px solid var(--border);
    padding: 6px 18px; font-size: 11px; color: var(--text2);
    display: flex; align-items: center; justify-content: space-between; gap: 12px;
  }
  .refresh-bar .countdown { color: var(--accent); font-weight: 600; }
  .mini-spin { width: 11px; height: 11px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; display: inline-block; animation: spin .8s linear infinite; vertical-align: middle; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Page container */
  .page { max-width: 880px; margin: 0 auto; padding: 16px 18px; }
  .page-title { font-size: 22px; font-weight: 800; margin-bottom: 4px; }
  .page-subtitle { font-size: 12px; color: var(--text2); margin-bottom: 16px; }

  /* Stat grid */
  .stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 18px; }
  .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 14px; text-align: center; }
  .stat-val { font-size: 26px; font-weight: 800; line-height: 1; }
  .stat-lbl { font-size: 10px; color: var(--text2); text-transform: uppercase; letter-spacing: .5px; margin-top: 6px; }

  /* Risk meter */
  .meter-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 18px; margin-bottom: 18px; }
  .meter-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .meter-head h3 { font-size: 14px; font-weight: 700; }
  .meter-score { font-size: 30px; font-weight: 900; }
  .meter-track { height: 12px; background: var(--surface2); border-radius: 8px; overflow: hidden; position: relative; }
  .meter-fill { height: 100%; border-radius: 8px; transition: width .6s ease, background .6s; }
  .meter-labels { display: flex; justify-content: space-between; font-size: 10px; color: var(--text2); margin-top: 6px; }

  /* Section */
  .section-head { font-size: 12px; color: var(--text2); text-transform: uppercase; letter-spacing: .6px; font-weight: 700; margin: 18px 0 10px; }

  /* Bar list */
  .bar-row { display: flex; align-items: center; gap: 10px; margin-bottom: 9px; }
  .bar-label { font-size: 12px; width: 110px; flex-shrink: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .bar-track { flex: 1; height: 8px; background: var(--surface2); border-radius: 6px; overflow: hidden; }
  .bar-fill { height: 100%; background: var(--accent); border-radius: 6px; }
  .bar-count { font-size: 12px; color: var(--text2); width: 26px; text-align: right; font-weight: 600; }

  /* Chips / tickers */
  .chip-row { display: flex; flex-wrap: wrap; gap: 7px; }
  .chip {
    font-size: 12px; font-weight: 600; background: rgba(61,139,253,.12);
    border: 1px solid rgba(61,139,253,.3); color: var(--accent); padding: 4px 11px; border-radius: 6px; cursor: pointer;
  }
  .chip.removable::after { content: ' \2715'; opacity: .6; }

  /* Filters */
  .filters { display: flex; gap: 7px; flex-wrap: wrap; margin-bottom: 14px; }
  .filter-btn {
    padding: 5px 13px; border-radius: 20px; border: 1px solid var(--border);
    background: transparent; color: var(--text2); font-size: 12px; cursor: pointer; transition: all .15s;
  }
  .filter-btn.active[data-risk="all"] { background: var(--accent); border-color: var(--accent); color: #fff; }
  .filter-btn.active[data-risk="Critical"] { background: var(--critical); border-color: var(--critical); color: #fff; }
  .filter-btn.active[data-risk="High"] { background: var(--high); border-color: var(--high); color: #111; }
  .filter-btn.active[data-risk="Medium"] { background: var(--medium); border-color: var(--medium); color: #111; }
  .filter-btn.active[data-risk="Low"] { background: var(--low); border-color: var(--low); color: #111; }
  .search-box {
    width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
    padding: 10px 14px; color: var(--text); font-size: 13px; margin-bottom: 12px; outline: none;
  }
  .search-box:focus { border-color: var(--accent); }

  /* Alert card */
  .card {
    background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
    overflow: hidden; cursor: pointer; transition: border-color .15s, transform .12s; margin-bottom: 11px;
  }
  .card:hover { border-color: var(--accent); transform: translateY(-1px); }
  .card-accent { height: 3px; }
  .card-body { padding: 13px 15px; }
  .card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; margin-bottom: 7px; }
  .risk-pill { font-size: 10px; font-weight: 800; letter-spacing: .8px; text-transform: uppercase; padding: 3px 9px; border-radius: 20px; white-space: nowrap; flex-shrink: 0; }
  .risk-Critical { background: rgba(229,57,53,.18); color: var(--critical); }
  .risk-High { background: rgba(251,140,0,.18); color: var(--high); }
  .risk-Medium { background: rgba(253,216,53,.18); color: var(--medium); }
  .risk-Low { background: rgba(102,187,106,.18); color: var(--low); }
  .card-title { font-size: 14px; font-weight: 600; line-height: 1.4; flex: 1; }
  .card-source { font-size: 11px; color: var(--text2); margin-bottom: 7px; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .source-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--accent); }
  .confirmed { color: var(--low); } .unconfirmed { color: var(--medium); }
  .card-summary { font-size: 12.5px; color: var(--text2); line-height: 1.5; margin-bottom: 9px; }
  .card-footer { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px; }
  .tickers { display: flex; gap: 5px; flex-wrap: wrap; }
  .ticker { font-size: 11px; font-weight: 700; background: rgba(61,139,253,.12); border: 1px solid rgba(61,139,253,.3); color: var(--accent); padding: 2px 7px; border-radius: 4px; }
  .ticker.watched { background: rgba(102,187,106,.15); border-color: rgba(102,187,106,.4); color: var(--low); }
  .card-time { font-size: 11px; color: var(--text2); }

  /* Skeleton */
  .skeleton { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 15px; margin-bottom: 11px; }
  .skel-line { height: 11px; border-radius: 6px; background: var(--surface2); margin-bottom: 9px; animation: shimmer 1.4s infinite; }
  .skel-line.w40{width:40%}.skel-line.w60{width:60%}.skel-line.w80{width:80%}
  @keyframes shimmer { 0%,100%{opacity:.4} 50%{opacity:.9} }

  /* Status / empty */
  .status-msg { text-align: center; padding: 30px 16px; color: var(--text2); font-size: 13px; line-height: 1.6; }
  .status-msg.error { color: var(--critical); }

  /* Detail modal */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,.7); z-index: 200;
    display: none; align-items: flex-end; justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--bg); border-top: 1px solid var(--border);
    border-radius: 18px 18px 0 0; width: 100%; max-width: 880px; max-height: 90vh;
    overflow-y: auto; padding: 0 0 30px; animation: slideUp .25s ease;
  }
  @keyframes slideUp { from { transform: translateY(40px); opacity: .6; } to { transform: translateY(0); opacity: 1; } }
  .modal-handle { width: 40px; height: 4px; background: var(--border); border-radius: 4px; margin: 10px auto; }
  .modal-body { padding: 8px 20px; }
  .detail-accent { height: 4px; border-radius: 4px; margin-bottom: 16px; }
  .detail-row { margin-bottom: 16px; }
  .detail-label { font-size: 10px; color: var(--text2); text-transform: uppercase; letter-spacing: .6px; margin-bottom: 5px; font-weight: 700; }
  .detail-val { font-size: 14px; line-height: 1.55; }
  .detail-statement { background: var(--surface); border-left: 3px solid var(--accent); border-radius: 8px; padding: 13px 15px; font-size: 14px; line-height: 1.6; font-style: italic; }
  .reliability-bar { height: 7px; background: var(--surface2); border-radius: 5px; overflow: hidden; margin-top: 5px; }
  .reliability-fill { height: 100%; background: var(--low); border-radius: 5px; }
  .open-link { display: inline-block; margin-top: 8px; color: var(--accent); font-size: 13px; font-weight: 600; }

  /* Source health rows */
  .src-row { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 13px 15px; margin-bottom: 9px; }
  .src-top { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
  .src-name { font-size: 13px; font-weight: 600; }
  .src-status { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; padding: 3px 9px; border-radius: 20px; }
  .src-connected { background: rgba(102,187,106,.18); color: var(--low); }
  .src-failed { background: rgba(229,57,53,.18); color: var(--critical); }
  .src-noitems { background: rgba(253,216,53,.18); color: var(--medium); }
  .src-meta { font-size: 11px; color: var(--text2); margin-top: 6px; }

  /* Settings rows */
  .set-row { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 14px 15px; margin-bottom: 9px; display: flex; align-items: center; justify-content: space-between; gap: 10px; }
  .set-label { font-size: 13px; }
  .set-value { font-size: 12px; color: var(--text2); }
  .interval-select { background: var(--surface2); color: var(--text); border: 1px solid var(--border); border-radius: 8px; padding: 6px 10px; font-size: 12px; }

  /* Bottom nav */
  .bottom-nav {
    position: fixed; bottom: 0; left: 0; right: 0; background: var(--surface);
    border-top: 1px solid var(--border); display: flex; z-index: 100; max-width: 880px; margin: 0 auto;
  }
  .nav-item {
    flex: 1; padding: 10px 4px 8px; text-align: center; cursor: pointer; color: var(--text2);
    font-size: 10px; transition: color .15s; position: relative;
  }
  .nav-item.active { color: var(--accent); }
  .nav-item .nav-icon { font-size: 19px; display: block; margin-bottom: 2px; }
  .nav-badge { position: absolute; top: 5px; right: 50%; margin-right: -22px; background: var(--critical); color: #fff; font-size: 8px; font-weight: 700; min-width: 15px; height: 15px; border-radius: 9px; padding: 0 4px; display: flex; align-items: center; justify-content: center; }

  @media (max-width: 480px) {
    .bar-label { width: 80px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">T</div>
    <div>
      <div class="logo-text">Trump Trading</div>
      <div class="logo-sub">Live market intelligence</div>
    </div>
  </div>
  <div class="live-badge"><div class="live-dot"></div>LIVE</div>
</header>

<div class="refresh-bar">
  <span id="lastUpdated">Loading feeds&hellip;</span>
  <span>Next refresh in <span class="countdown" id="countdown">&mdash;</span></span>
</div>

<div id="app"></div>

<div class="modal-overlay" id="modal" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<nav class="bottom-nav" id="bottomNav"></nav>

<script>
// ============================ TIME (Cairo UTC+3) ============================
function cairoNow() { return new Date(new Date().toLocaleString('en-US',{timeZone:'Africa/Cairo'})); }
function toCairo(d) { return new Date(d.toLocaleString('en-US',{timeZone:'Africa/Cairo'})); }
function relTime(d) {
  const m = Math.floor((cairoNow() - toCairo(d)) / 60000);
  if (isNaN(m)) return '';
  if (m < 1) return 'just now';
  if (m < 60) return m + ' min ago';
  const h = Math.floor(m/60); if (h < 24) return h + 'h ago';
  return Math.floor(h/24) + 'd ago';
}
function cairoClock(d) {
  d = d || new Date();
  return d.toLocaleString('en-US',{timeZone:'Africa/Cairo',hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false});
}
function cairoFull(d) {
  return d.toLocaleString('en-US',{timeZone:'Africa/Cairo',weekday:'short',day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit',hour12:false}) + ' Cairo';
}

// ============================ ENRICHMENT ============================
const KW = {
  Critical: ['tariff','sanction','war','nuclear','attack','missile','invasion','strike','troops','airstrike','ceasefire','coup','collapse','emergency','military action','bomb'],
  High: ['trade war','economy','inflation','interest rate','fed','china','russia','iran','ukraine','israel','hamas','hezbollah','nato','oil price','recession','tax','tariffs'],
  Medium: ['market','stock','deal','negotiate','diplomat','policy','congress','senate','vote','election','trade','dollar','border'],
};
function classify(text) {
  const t = text.toLowerCase();
  if (KW.Critical.some(k=>t.includes(k))) return 'Critical';
  if (KW.High.some(k=>t.includes(k))) return 'High';
  if (KW.Medium.some(k=>t.includes(k))) return 'Medium';
  return 'Low';
}
function urgency(text, risk) {
  const t = text.toLowerCase();
  let base = { Critical: 78, High: 58, Medium: 38, Low: 18 }[risk];
  let hits = 0;
  KW.Critical.concat(KW.High).forEach(k => { if (t.includes(k)) hits++; });
  return Math.min(100, base + Math.min(hits * 3, 18));
}
const TICKERS = {
  'oil':'OIL','crude':'OIL','opec':'OIL','petroleum':'OIL',
  'gold':'GLD','treasury':'TLT','bonds':'TLT','bond':'TLT',
  'dollar':'DXY','usd':'DXY',
  'china':'FXI','chinese':'FXI','russia':'RSX','russian':'RSX',
  'iran':'OIL','ukraine':'OIL','gaza':'OIL','israel':'OIL',
  'defense':'ITA','military':'ITA','weapons':'ITA','lockheed':'LMT','boeing':'BA','raytheon':'RTX',
  'apple':'AAPL','tech':'QQQ','nvidia':'NVDA','semiconductor':'SOXX','chip':'SOXX',
  'bank':'XLF','banks':'XLF','fed':'TLT','interest rate':'TLT','federal reserve':'TLT',
  'tariff':'SPY','trade':'SPY','economy':'SPY','tariffs':'SPY',
  'nasdaq':'QQQ','s&p':'SPY','dow':'DIA',
  'energy':'XLE','gas':'UNG','natural gas':'UNG','steel':'SLX','aluminum':'SLX',
  'pharma':'XPH','healthcare':'XLV','drug':'XPH',
  'tesla':'TSLA','crypto':'BITO','bitcoin':'BITO',
};
function extractTickers(text) {
  const t = text.toLowerCase(); const s = new Set();
  for (const k in TICKERS) if (t.includes(k)) s.add(TICKERS[k]);
  return Array.from(s).slice(0,5);
}
const SECTORS = {
  'Energy': ['oil','crude','gas','opec','petroleum','energy','pipeline'],
  'Defense': ['military','defense','weapons','troops','missile','war','lockheed','boeing','raytheon','army','airstrike'],
  'Technology': ['tech','nvidia','apple','semiconductor','chip','ai','software'],
  'Financials': ['bank','fed','interest rate','dollar','treasury','federal reserve','wall street'],
  'Healthcare': ['pharma','healthcare','drug','medicine','hospital'],
  'Materials': ['steel','aluminum','copper','mining','metals'],
  'Trade': ['tariff','trade','import','export','china trade','supply chain'],
};
function extractSectors(text) {
  const t = text.toLowerCase(); const s = [];
  for (const sec in SECTORS) if (SECTORS[sec].some(k=>t.includes(k))) s.push(sec);
  return s.slice(0,4);
}
function category(text) {
  const t = text.toLowerCase();
  if (['war','military','troops','missile','attack','nuclear','airstrike','army'].some(k=>t.includes(k))) return 'Military Action';
  if (['tariff','trade','import','export','economy','inflation'].some(k=>t.includes(k))) return 'Trade & Tariffs';
  if (['iran','russia','china','ukraine','israel','nato','gaza','hamas'].some(k=>t.includes(k))) return 'Geopolitics';
  if (['fed','interest rate','dollar','bond','treasury','federal reserve'].some(k=>t.includes(k))) return 'Monetary Policy';
  if (['sanction','congress','senate','executive order','law','policy'].some(k=>t.includes(k))) return 'Policy & Regulation';
  return 'Markets';
}
function riskColor(r) { return {Critical:'#E53935',High:'#FB8C00',Medium:'#FDD835',Low:'#66BB6A'}[r]||'#3D8BFD'; }
function isConfirmed(src) { return /white house|associated press|\bap\b|reuters|c-span/i.test(src); }

// ============================ FEEDS ============================
const GN = 'https://news.google.com/rss/search?hl=en-US&gl=US&ceid=US:en&q=';
function gn(q){ return GN + encodeURIComponent(q); }
function gsite(site){ return gn('Trump site:' + site + ' when:3d'); }

// Full source catalog (grouped). Every source here is polled and shown on the
// Sources screen with live status.
const SOURCES = [
  // ── Official US government ──
  { name: 'White House — News',         url: 'https://www.whitehouse.gov/news/feed/',                 group: 'Official', kind: 'official' },
  { name: 'White House — Actions',      url: 'https://www.whitehouse.gov/presidential-actions/feed/', group: 'Official', kind: 'official' },
  { name: 'Federal Register — Presidential', url: 'https://www.federalregister.gov/api/v1/documents.rss?conditions%5Btype%5D%5B%5D=PRESDOCU&order=newest', group: 'Official', kind: 'official' },
  // ── Market & financial ──
  { name: 'CNBC — Top News',            url: 'https://www.cnbc.com/id/100003114/device/rss/rss.html', group: 'Market', kind: 'news' },
  { name: 'CNBC — Economy',             url: 'https://www.cnbc.com/id/20910258/device/rss/rss.html',  group: 'Market', kind: 'news' },
  { name: 'MarketWatch — Top',          url: 'https://feeds.content.dowjones.io/public/rss/mw_topstories', group: 'Market', kind: 'news' },
  { name: 'Yahoo Finance',              url: 'https://feeds.finance.yahoo.com/rss/2.0/headline?s=^GSPC&region=US&lang=en-US', group: 'Market', kind: 'news' },
  { name: 'Reuters · Trump',            url: gsite('reuters.com'),     group: 'Market', kind: 'news' },
  { name: 'CNBC · Trump',               url: gsite('cnbc.com'),        group: 'Market', kind: 'news' },
  { name: 'MarketWatch · Trump',        url: gsite('marketwatch.com'), group: 'Market', kind: 'news' },
  // ── General reliable news ──
  { name: 'Google News · Trump',        url: gn('Trump when:1d'),      group: 'General', kind: 'news' },
  { name: 'AP · Trump',                 url: gsite('apnews.com'),      group: 'General', kind: 'news' },
  { name: 'BBC · Trump',                url: gsite('bbc.com'),         group: 'General', kind: 'news' },
  { name: 'CNN · Trump',                url: gsite('cnn.com'),         group: 'General', kind: 'news' },
  { name: 'Fox News · Trump',           url: gsite('foxnews.com'),     group: 'General', kind: 'news' },
  { name: 'The Guardian · Trump',       url: gsite('theguardian.com'), group: 'General', kind: 'news' },
  { name: 'Politico · Trump',           url: gsite('politico.com'),    group: 'General', kind: 'news' },
  { name: 'Axios · Trump',              url: gsite('axios.com'),       group: 'General', kind: 'news' },
  { name: 'The Hill · Trump',           url: gsite('thehill.com'),     group: 'General', kind: 'news' },
  { name: 'NPR · Trump',                url: gsite('npr.org'),         group: 'General', kind: 'news' },
  { name: 'CBS News · Trump',           url: gsite('cbsnews.com'),     group: 'General', kind: 'news' },
  { name: 'ABC News · Trump',           url: gsite('abcnews.go.com'),  group: 'General', kind: 'news' },
  { name: 'NBC News · Trump',           url: gsite('nbcnews.com'),     group: 'General', kind: 'news' },
  { name: 'New York Times · Trump',     url: gsite('nytimes.com'),     group: 'General', kind: 'news' },
  { name: 'Washington Post · Trump',    url: gsite('washingtonpost.com'), group: 'General', kind: 'news' },
  // ── International / geopolitical ──
  { name: 'Al Jazeera · Trump',         url: gsite('aljazeera.com'),   group: 'Geopolitical', kind: 'news' },
  { name: 'France24 · Trump',           url: gsite('france24.com'),    group: 'Geopolitical', kind: 'news' },
  { name: 'DW · Trump',                 url: gsite('dw.com'),          group: 'Geopolitical', kind: 'news' },
  { name: 'Wars & Conflicts',           url: gn('war OR conflict OR ceasefire OR strike when:1d'), group: 'Geopolitical', kind: 'news' },
  { name: 'Middle East',                url: gn('Gaza OR Israel OR Iran when:1d'),  group: 'Geopolitical', kind: 'news' },
  { name: 'Ukraine / Russia',           url: gn('Ukraine Russia when:1d'),          group: 'Geopolitical', kind: 'news' },
  // ── Truth Social via News ──
  { name: 'Truth Social via News — core',    url: gn('Trump "Truth Social" when:3d'), group: 'Truth Social via News', kind: 'news' },
  { name: 'Truth Social via News — markets', url: gn('Trump "Truth Social" (tariff OR oil OR crypto OR stocks OR Fed OR sanctions) when:3d'), group: 'Truth Social via News', kind: 'news' },
];

// CORS proxies, tried in order. allorigins is most reliable; rss2json last
// because its free tier rate-limits (the 503s you saw on Google News / AP).
const PROXIES = [
  { name: 'allorigins-raw', kind: 'xml',     build: u => 'https://api.allorigins.win/raw?url=' + encodeURIComponent(u) },
  { name: 'allorigins-get', kind: 'wrapped', build: u => 'https://api.allorigins.win/get?url=' + encodeURIComponent(u) },
  { name: 'codetabs',       kind: 'xml',     build: u => 'https://api.codetabs.com/v1/proxy/?quest=' + encodeURIComponent(u) },
  { name: 'corsproxy',      kind: 'xml',     build: u => 'https://corsproxy.io/?url=' + encodeURIComponent(u) },
  { name: 'rss2json',       kind: 'json',    build: u => 'https://api.rss2json.com/v1/api.json?rss_url=' + encodeURIComponent(u) + '&count=25' },
];

function parseXmlItems(text) {
  const xml = new DOMParser().parseFromString(text, 'text/xml');
  const ch = xml.querySelector('channel > title') || xml.querySelector('feed > title');
  const src = ch ? ch.textContent : '';
  let nodes = Array.from(xml.querySelectorAll('item'));
  if (!nodes.length) nodes = Array.from(xml.querySelectorAll('entry')); // Atom
  return nodes.slice(0, 25).map(it => {
    const g = sel => { const e = it.querySelector(sel); return e ? e.textContent : ''; };
    const link = it.querySelector('link');
    const href = link ? (link.getAttribute('href') || link.textContent) : '';
    return mkItem(g('title'), g('description') || g('summary') || g('content'), g('pubDate') || g('updated') || g('published'), href, src);
  });
}
async function fetchVia(proxy, url) {
  const r = await fetch(proxy.build(url), { signal: AbortSignal.timeout(9000) });
  if (!r.ok) throw new Error('HTTP ' + r.status);
  if (proxy.kind === 'json') {
    const d = await r.json();
    if (d.status !== 'ok') throw new Error(d.message || 'rss2json error');
    return (d.items || []).map(it => mkItem(it.title, it.description || it.content, it.pubDate, it.link, d.feed && d.feed.title));
  }
  let text;
  if (proxy.kind === 'wrapped') { const d = await r.json(); text = d.contents || ''; }
  else text = await r.text();
  const items = parseXmlItems(text);
  if (!items.length) throw new Error('empty/unparseable');
  return items;
}
function mkItem(title, desc, pub, link, src) {
  return {
    title: (title||'').replace(/<[^>]+>/g,'').trim(),
    summary: (desc||'').replace(/<[^>]+>/g,'').trim().slice(0,240),
    pubDate: new Date(pub||Date.now()), link: link||'#', source: (src||'').replace(/<[^>]+>/g,'').trim() || 'News',
  };
}
const sleep = ms => new Promise(r => setTimeout(r, ms));
// Rotate the proxy start position per feed so we don't always hammer the same
// proxy first (that's what trips the free-tier rate limits → HTTP 422/429/503).
let proxyRotation = 0;
function proxyOrder() {
  const n = PROXIES.length;
  const start = (proxyRotation++) % n;
  return PROXIES.slice(start).concat(PROXIES.slice(0, start));
}
async function fetchFeed(feed, attempt) {
  attempt = attempt || 0;
  await sleep(Math.random() * 350); // jitter so requests don't burst together
  let lastErr = '';
  for (const p of proxyOrder()) {
    try { const items = await fetchVia(p, feed.url); return { feed, items, status: items.length ? 'connected' : 'no-items' }; }
    catch(e) { lastErr = (e && e.message) || 'error'; }
  }
  // Retry the whole chain up to 2 more times — proxy rate-limits are transient.
  if (attempt < 2) { await sleep(900 + Math.random() * 900); return fetchFeed(feed, attempt + 1); }
  return { feed, items: [], status: 'failed', error: lastErr };
}
// Limited-concurrency map so we don't hammer the proxies (which itself causes 503s).
async function poolMap(arr, n, fn) {
  const out = new Array(arr.length);
  let i = 0;
  async function worker() { while (i < arr.length) { const idx = i++; out[idx] = await fn(arr[idx]); } }
  await Promise.all(Array.from({ length: Math.min(n, arr.length) }, worker));
  return out;
}

// ============================ STATE ============================
const State = {
  alerts: [], feedHealth: [], usingFallback: false,
  route: location.hash.replace('#','') || 'dashboard',
  riskFilter: 'all', categoryFilter: null, search: '',
  feedLimit: 25,
  watchlist: JSON.parse(localStorage.getItem('tt_watchlist') || '["OIL","SPY","DXY"]'),
  lastUpdated: null, loading: true, error: null,
  refreshMs: parseInt(localStorage.getItem('tt_refresh') || '120000'),
};
function saveWatchlist() { localStorage.setItem('tt_watchlist', JSON.stringify(State.watchlist)); }

// ============================ LOAD ============================
async function loadFeeds() {
  State.loading = true;
  renderRefreshBar();

  // Poll the full catalog with low concurrency (3 at a time) to stay under the
  // free CORS-proxy rate limits.
  let results = await poolMap(SOURCES, 3, (f) => fetchFeed(f, 0));
  // Second pass: re-poll any that still failed (transient proxy throttling).
  const failedIdx = results.map((r, i) => r.status === 'failed' ? i : -1).filter(i => i >= 0);
  if (failedIdx.length) {
    await sleep(1200);
    const retried = await poolMap(failedIdx.map(i => SOURCES[i]), 2, (f) => fetchFeed(f, 0));
    failedIdx.forEach((idx, k) => { if (retried[k] && retried[k].status !== 'failed') results[idx] = retried[k]; });
  }
  State.feedHealth = results.map(r => ({ name: r.feed.name, group: r.feed.group, kind: r.feed.kind, status: r.status, count: r.items.length, error: r.error }));

  let items = results.reduce((acc, r) => acc.concat(r.items), []);
  // Prefer Trump-relevant items; if very few, keep everything (wars/markets fill in).
  const trumpItems = items.filter(it => /trump|white house|president|tariff|maga|mar-a-lago|administration/i.test(it.title + it.summary));
  State.usingFallback = trumpItems.length < 3;
  if (!State.usingFallback) items = trumpItems;

  if (!items.length) {
    State.error = 'Could not reach any news feeds. Check your internet connection or try Refresh.';
    State.loading = false; State.lastUpdated = new Date(); render(); return;
  }
  State.error = null;

  const seen = new Set();
  items = items.filter(it => { const k = it.title.toLowerCase().slice(0,60); if (seen.has(k)) return false; seen.add(k); return true; });

  State.alerts = items.map((it,i) => {
    const txt = it.title + ' ' + it.summary;
    const risk = classify(txt);
    return {
      id: 'a' + i + '_' + it.pubDate.getTime(),
      title: it.title, summary: it.summary, pubDate: it.pubDate, link: it.link, source: it.source,
      risk: risk,
      urgency: urgency(txt, risk),
      tickers: extractTickers(txt),
      sectors: extractSectors(txt),
      category: category(txt),
      confirmed: isConfirmed(it.source),
    };
  }).sort((a,b) => b.pubDate - a.pubDate).slice(0, 60);

  State.lastUpdated = new Date();
  State.loading = false;
  render();
}

// ============================ COUNTDOWN ============================
let nextRefreshAt = Date.now() + State.refreshMs;
function tickCountdown() {
  const remaining = Math.max(0, Math.round((nextRefreshAt - Date.now())/1000));
  const el = document.getElementById('countdown');
  if (el) el.textContent = remaining + 's';
}
function scheduleRefresh() { nextRefreshAt = Date.now() + State.refreshMs; }
setInterval(() => {
  tickCountdown();
  if (Date.now() >= nextRefreshAt && !State.loading) { scheduleRefresh(); loadFeeds(); }
}, 1000);

// ============================ RENDER ============================
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function render() {
  renderRefreshBar();
  renderNav();
  const app = document.getElementById('app');
  if (State.loading && !State.alerts.length) { app.innerHTML = skeletonPage(); return; }
  if (State.error && !State.alerts.length) { app.innerHTML = '<div class="page"><div class="status-msg error">' + esc(State.error) + '</div></div>'; return; }
  switch (State.route) {
    case 'dashboard': app.innerHTML = renderDashboard(); break;
    case 'alerts':    app.innerHTML = renderAlerts(); break;
    case 'watchlist': app.innerHTML = renderWatchlist(); break;
    case 'sources':   app.innerHTML = renderSources(); break;
    case 'settings':  app.innerHTML = renderSettings(); break;
    default:          app.innerHTML = renderDashboard();
  }
}

function renderRefreshBar() {
  const el = document.getElementById('lastUpdated');
  if (!el) return;
  if (State.loading) { el.innerHTML = '<span class="mini-spin"></span> Fetching live feeds&hellip;'; return; }
  if (!State.lastUpdated) return;
  const mode = State.usingFallback ? '⚠️ Wars & conflicts (no Trump news)' : '✅ Trump news';
  el.innerHTML = mode + ' · updated ' + cairoClock(State.lastUpdated) + ' Cairo';
}

function renderDashboard() {
  const a = State.alerts;
  const counts = { Critical:0, High:0, Medium:0, Low:0 };
  a.forEach(x => counts[x.risk]++);
  const avgUrgency = a.length ? Math.round(a.reduce((s,x)=>s+x.urgency,0)/a.length) : 0;
  const meterColor = avgUrgency >= 70 ? '#E53935' : avgUrgency >= 50 ? '#FB8C00' : avgUrgency >= 30 ? '#FDD835' : '#66BB6A';
  const meterLabel = avgUrgency >= 70 ? 'ELEVATED RISK' : avgUrgency >= 50 ? 'HEIGHTENED' : avgUrgency >= 30 ? 'MODERATE' : 'CALM';

  const secCount = {};
  a.forEach(x => x.sectors.forEach(s => secCount[s] = (secCount[s]||0)+1));
  const topSectors = Object.entries(secCount).sort((x,y)=>y[1]-x[1]).slice(0,6);
  const maxSec = topSectors.length ? topSectors[0][1] : 1;

  const tkCount = {};
  a.forEach(x => x.tickers.forEach(t => tkCount[t] = (tkCount[t]||0)+1));
  const topTickers = Object.entries(tkCount).sort((x,y)=>y[1]-x[1]).slice(0,8);
  const maxTk = topTickers.length ? topTickers[0][1] : 1;

  const highImpact = a.filter(x => x.risk==='Critical'||x.risk==='High').slice(0,4);

  return '<div class="page">' +
    '<div class="page-title">Dashboard</div>' +
    '<div class="page-subtitle">Aggregated from ' + a.length + ' live items · ' + cairoFull(State.lastUpdated||new Date()) + '</div>' +
    '<div class="meter-card">' +
      '<div class="meter-head"><h3>Market Risk Meter</h3><div class="meter-score" style="color:'+meterColor+'">'+avgUrgency+'</div></div>' +
      '<div class="meter-track"><div class="meter-fill" style="width:'+avgUrgency+'%;background:'+meterColor+'"></div></div>' +
      '<div class="meter-labels"><span>Calm</span><span style="color:'+meterColor+';font-weight:700">'+meterLabel+'</span><span>Critical</span></div>' +
    '</div>' +
    '<div class="stat-grid">' +
      '<div class="stat-card"><div class="stat-val" style="color:var(--critical)">'+counts.Critical+'</div><div class="stat-lbl">Critical</div></div>' +
      '<div class="stat-card"><div class="stat-val" style="color:var(--high)">'+counts.High+'</div><div class="stat-lbl">High</div></div>' +
      '<div class="stat-card"><div class="stat-val" style="color:var(--medium)">'+counts.Medium+'</div><div class="stat-lbl">Medium</div></div>' +
    '</div>' +
    (highImpact.length ? '<div class="section-head">⚡ High-impact now</div>' + highImpact.map(alertCardHtml).join('') : '') +
    '<div class="section-head">Top affected sectors</div>' +
    (topSectors.length ? topSectors.map(e => '<div class="bar-row"><div class="bar-label">'+esc(e[0])+'</div><div class="bar-track"><div class="bar-fill" style="width:'+(e[1]/maxSec*100)+'%"></div></div><div class="bar-count">'+e[1]+'</div></div>').join('') : '<div class="status-msg">No sector data yet.</div>') +
    '<div class="section-head">Most mentioned tickers</div>' +
    (topTickers.length ? topTickers.map(e => '<div class="bar-row"><div class="bar-label"><span class="ticker '+(State.watchlist.includes(e[0])?'watched':'')+'">'+e[0]+'</span></div><div class="bar-track"><div class="bar-fill" style="width:'+(e[1]/maxTk*100)+'%"></div></div><div class="bar-count">'+e[1]+'</div></div>').join('') : '<div class="status-msg">No ticker data yet.</div>') +
  '</div>';
}

function renderAlerts() {
  let list = State.alerts;
  if (State.riskFilter !== 'all') list = list.filter(x => x.risk === State.riskFilter);
  if (State.categoryFilter) list = list.filter(x => x.category === State.categoryFilter);
  if (State.search) { const q = State.search.toLowerCase(); list = list.filter(x => (x.title+x.summary).toLowerCase().includes(q)); }
  const shown = list.slice(0, State.feedLimit);

  return '<div class="page">' +
    '<div class="page-title">Live Alerts</div>' +
    '<div class="page-subtitle">' + list.length + ' alerts' + (State.categoryFilter?' · '+esc(State.categoryFilter):'') + ' · auto-refresh every ' + (State.refreshMs/1000) + 's</div>' +
    '<input class="search-box" placeholder="Search alerts…" value="'+esc(State.search)+'" oninput="onSearch(this.value)">' +
    '<div class="filters">' +
      ['all','Critical','High','Medium','Low'].map(r => '<button class="filter-btn '+(State.riskFilter===r?'active':'')+'" data-risk="'+r+'" onclick="setRiskFilter(\''+r+'\')">'+(r==='all'?'All':r)+'</button>').join('') +
    '</div>' +
    (State.categoryFilter ? '<div style="margin-bottom:12px"><span class="chip removable" onclick="setCategory(null)">'+esc(State.categoryFilter)+'</span></div>' : '') +
    (shown.length ? shown.map(alertCardHtml).join('') : '<div class="status-msg">No alerts match this filter.</div>') +
    (list.length > State.feedLimit ? '<div style="text-align:center;margin-top:8px"><button class="filter-btn" onclick="loadMore()">Load more ('+(list.length - State.feedLimit)+' more)</button></div>' : '') +
  '</div>';
}

function alertCardHtml(a) {
  return '<div class="card" onclick="openDetail(\''+a.id+'\')">' +
    '<div class="card-accent" style="background:'+riskColor(a.risk)+'"></div>' +
    '<div class="card-body">' +
      '<div class="card-top"><div class="card-title">'+esc(a.title)+'</div><div class="risk-pill risk-'+a.risk+'">'+a.risk+'</div></div>' +
      '<div class="card-source"><div class="source-dot"></div>'+esc(a.source)+' · '+esc(a.category)+' · <span class="'+(a.confirmed?'confirmed':'unconfirmed')+'">'+(a.confirmed?'✓ confirmed':'○ unconfirmed')+'</span></div>' +
      (a.summary ? '<div class="card-summary">'+esc(a.summary)+'</div>' : '') +
      '<div class="card-footer">' +
        '<div class="tickers">'+a.tickers.map(t=>'<span class="ticker '+(State.watchlist.includes(t)?'watched':'')+'">'+t+'</span>').join('')+'</div>' +

}

function renderWatchlist() {
  const wl = State.watchlist;
  const matched = State.alerts.filter(a => a.tickers.some(t => wl.includes(t)));
  return '<div class="page">' +
    '<div class="page-title">Watchlist</div>' +
    '<div class="page-subtitle">' + wl.length + ' tickers tracked · ' + matched.length + ' matching alerts</div>' +
    '<div class="chip-row" style="margin-bottom:8px">' +
      (wl.map(t => '<span class="chip removable" onclick="removeTicker(\''+t+'\')">'+t+'</span>').join('') || '<span class="set-value">No tickers yet.</span>') +

    '<input class="search-box" id="tickerInput" placeholder="Add ticker (e.g. OIL, SPY, NVDA) then Enter" onkeydown="if(event.key===\'Enter\')addTicker(this.value)">' +
    '<div class="section-head">Alerts matching your watchlist</div>' +
    (matched.length ? matched.map(alertCardHtml).join('') : '<div class="status-msg">No current alerts mention your watchlist tickers.<br>They\'ll appear here as news breaks.</div>') +
  '</div>';
}

function renderSources() {
  const h = State.feedHealth;
  const cls = s => s==='connected'?'src-connected':s==='failed'?'src-failed':'src-noitems';
  const lbl = s => s==='connected'?'Connected':s==='failed'?'Failed':'No items';
  const connected = h.filter(s => s.status==='connected').length;
  const failed = h.filter(s => s.status==='failed').length;

  const GROUP_ORDER = ['Official','Market','General','Geopolitical','Truth Social via News'];
  const rowHtml = s => '<div class="src-row"><div class="src-top"><div class="src-name">'+esc(s.name)+
    (s.kind==='official'?' <span style="color:var(--low);font-size:9px;font-weight:700">OFFICIAL</span>':'')+
    '</div><div class="src-status '+cls(s.status)+'">'+lbl(s.status)+'</div></div>'+
    '<div class="src-meta">'+s.count+' items fetched'+(s.error?' · '+esc(s.error):'')+'</div></div>';

  let groupsHtml = '';
  for (const g of GROUP_ORDER) {
    const list = h.filter(s => s.group === g);
    if (!list.length) continue;
    groupsHtml += '<div class="section-head">'+esc(g)+'</div>' + list.map(rowHtml).join('');
  }
  // any groups not in the explicit order
  const known = new Set(GROUP_ORDER);
  const others = h.filter(s => !known.has(s.group));
  if (others.length) groupsHtml += '<div class="section-head">Other</div>' + others.map(rowHtml).join('');

  return '<div class="page">' +
    '<div class="page-title">Sources</div>' +
    '<div class="page-subtitle">' + (h.length ? (connected+' connected · '+failed+' failed · '+h.length+' total') : 'Live feed health') +
      ' · last checked ' + (State.lastUpdated?cairoClock(State.lastUpdated)+' Cairo':'—') + '</div>' +
    '<div class="section-head">Truth Social (Direct)</div>' +
    '<div class="src-row" style="border-color:rgba(229,57,53,.3)"><div class="src-top"><div class="src-name">Truth Social — @realDonaldTrump</div><div class="src-status src-failed">Unavailable</div></div><div class="src-meta">No public real-time API. Cloudflare blocks browser/Node fetch. Works only in the backend via a system-curl workaround — not reachable from this web preview.</div></div>' +
    (h.length ? groupsHtml : '<div class="status-msg">Loading sources…</div>') +
  '</div>';
}

function onSearch(v) { State.search = v; render(); const i=document.querySelector('.search-box'); if(i){i.focus();i.setSelectionRange(v.length,v.length);} }
function loadMore() { State.feedLimit += 25; render(); }
function addTicker(t) { t=(t||'').trim().toUpperCase(); if(t && !State.watchlist.includes(t)){State.watchlist.push(t); saveWatchlist();} render(); }
function removeTicker(t) { State.watchlist = State.watchlist.filter(x=>x!==t); saveWatchlist(); render(); }
function setRefresh(ms) { State.refreshMs = parseInt(ms); localStorage.setItem('tt_refresh', ms); scheduleRefresh(); render(); }
function manualRefresh() { scheduleRefresh(); loadFeeds(); }

function renderNav() {
  const items = [
    { r:'dashboard', i:'📊', l:'Dashboard' },
    { r:'alerts', i:'🔔', l:'Alerts' },
    { r:'watchlist', i:'⭐', l:'Watchlist' },
    { r:'sources', i:'📡', l:'Sources' },
    { r:'settings', i:'⚙️', l:'Settings' },
  ];
  const critCount = State.alerts.filter(a=>a.risk==='Critical').length;
  document.getElementById('bottomNav').innerHTML = items.map(it =>
    '<div class="nav-item '+(State.route===it.r?'active':'')+'" onclick="go(\''+it.r+'\')">' +
      '<span class="nav-icon">'+it.i+'</span>'+it.l +
      (it.r==='alerts' && critCount ? '<span class="nav-badge">'+critCount+'</span>' : '') +
    '</div>').join('');
}

function skeletonPage() {
  let s = '<div class="page">';
  for (let i=0;i<6;i++) s += '<div class="skeleton"><div class="skel-line w40"></div><div class="skel-line w80"></div><div class="skel-line w60"></div></div>';
  return s + '</div>';
}

window.addEventListener('hashchange', () => { State.route = location.hash.replace('#','')||'dashboard'; render(); });

// ============================ BOOT ============================
render();
loadFeeds();
scheduleRefresh();
</script>
</body>
</html>
