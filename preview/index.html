<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trump Trading — Live Alert Feed</title>
<style>
  :root {
    --bg: #0B0F14;
    --surface: #121821;
    --surface2: #1A2233;
    --critical: #E53935;
    --high: #FB8C00;
    --medium: #FDD835;
    --low: #66BB6A;
    --accent: #3D8BFD;
    --text: #E8EAF0;
    --text2: #8A94A6;
    --border: #1E2A3A;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; }

  /* ── Header ── */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 14px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
  }
  .logo { display: flex; align-items: center; gap: 10px; }
  .logo-icon {
    width: 36px; height: 36px; background: var(--accent);
    border-radius: 8px; display: flex; align-items: center; justify-content: center;
    font-size: 18px; font-weight: 900; color: #fff;
  }
  .logo-text { font-size: 18px; font-weight: 700; letter-spacing: .5px; }
  .logo-sub { font-size: 11px; color: var(--text2); margin-top: 1px; }
  .live-badge {
    display: flex; align-items: center; gap: 6px;
    background: rgba(229,57,53,.15); border: 1px solid var(--critical);
    color: var(--critical); border-radius: 20px; padding: 4px 12px;
    font-size: 12px; font-weight: 600; letter-spacing: 1px;
  }
  .live-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--critical); animation: pulse 1.2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

  /* ── Stats bar ── */
  .stats-bar {
    background: var(--surface); border-bottom: 1px solid var(--border);
    padding: 10px 20px; display: flex; gap: 24px; overflow-x: auto;
  }
  .stat { display: flex; flex-direction: column; align-items: center; min-width: 70px; }
  .stat-val { font-size: 20px; font-weight: 700; }
  .stat-lbl { font-size: 10px; color: var(--text2); letter-spacing: .5px; text-transform: uppercase; margin-top: 1px; }

  /* ── Filters ── */
  .filters {
    padding: 12px 20px; display: flex; gap: 8px; flex-wrap: wrap;
    background: var(--surface2); border-bottom: 1px solid var(--border);
  }
  .filter-btn {
    padding: 5px 14px; border-radius: 20px; border: 1px solid var(--border);
    background: transparent; color: var(--text2); font-size: 12px; cursor: pointer;
    transition: all .2s;
  }
  .filter-btn.active, .filter-btn:hover { color: #fff; }
  .filter-btn[data-risk="all"].active { background: var(--accent); border-color: var(--accent); }
  .filter-btn[data-risk="CRITICAL"].active { background: var(--critical); border-color: var(--critical); }
  .filter-btn[data-risk="HIGH"].active { background: var(--high); border-color: var(--high); }
  .filter-btn[data-risk="MEDIUM"].active { background: var(--medium); border-color: var(--medium); color: #111; }
  .filter-btn[data-risk="LOW"].active { background: var(--low); border-color: var(--low); color: #111; }

  /* ── Feed ── */
  .feed { padding: 16px 20px; display: flex; flex-direction: column; gap: 12px; max-width: 860px; margin: 0 auto; }

  /* ── Alert card ── */
  .card {
    background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
    overflow: hidden; cursor: pointer; transition: border-color .2s, transform .15s;
  }
  .card:hover { border-color: var(--accent); transform: translateY(-1px); }
  .card-accent { height: 3px; }
  .card-body { padding: 14px 16px; }
  .card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; margin-bottom: 8px; }
  .risk-pill {
    font-size: 10px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase;
    padding: 3px 9px; border-radius: 20px; white-space: nowrap; flex-shrink: 0;
  }
  .risk-CRITICAL { background: rgba(229,57,53,.18); color: var(--critical); }
  .risk-HIGH     { background: rgba(251,140,0,.18); color: var(--high); }
  .risk-MEDIUM   { background: rgba(253,216,53,.18); color: var(--medium); }
  .risk-LOW      { background: rgba(102,187,106,.18); color: var(--low); }

  .card-title { font-size: 14px; font-weight: 600; line-height: 1.4; flex: 1; }
  .card-source { font-size: 11px; color: var(--text2); margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
  .source-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--accent); }
  .card-summary { font-size: 13px; color: var(--text2); line-height: 1.55; margin-bottom: 10px; }
  .card-footer { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px; }
  .tickers { display: flex; gap: 5px; flex-wrap: wrap; }
  .ticker {
    font-size: 11px; font-weight: 600; background: rgba(61,139,253,.12);
    border: 1px solid rgba(61,139,253,.3); color: var(--accent);
    padding: 2px 8px; border-radius: 4px;
  }
  .card-time { font-size: 11px; color: var(--text2); }

  /* ── Skeleton ── */
  .skeleton { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 16px; }
  .skel-line { height: 12px; border-radius: 6px; background: var(--surface2); margin-bottom: 10px; animation: shimmer 1.4s infinite; }
  .skel-line.w60 { width: 60%; }
  .skel-line.w40 { width: 40%; }
  .skel-line.w80 { width: 80%; }
  @keyframes shimmer { 0%,100%{opacity:.5} 50%{opacity:1} }

  /* ── Status message ── */
  .status-msg { text-align: center; padding: 24px; color: var(--text2); font-size: 14px; }
  .status-msg.error { color: var(--critical); }

  /* ── Refresh btn ── */
  .refresh-btn {
    position: fixed; bottom: 24px; right: 24px;
    background: var(--accent); color: #fff; border: none; border-radius: 50px;
    padding: 12px 20px; font-size: 14px; font-weight: 600; cursor: pointer;
    box-shadow: 0 4px 20px rgba(61,139,253,.4); transition: opacity .2s;
    display: flex; align-items: center; gap: 8px;
  }
  .refresh-btn:hover { opacity: .9; }
  .refresh-btn:disabled { opacity: .5; cursor: default; }
  .spin { animation: spin 1s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Source label ── */
  .feed-label {
    text-align: center; font-size: 11px; color: var(--text2);
    padding: 6px; letter-spacing: .5px;
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">T</div>
    <div>
      <div class="logo-text">Trump Trading</div>
      <div class="logo-sub">Real-time market intelligence</div>
    </div>
  </div>
  <div class="live-badge"><div class="live-dot"></div>LIVE</div>
</header>

<div class="stats-bar" id="statsBar">
  <div class="stat"><div class="stat-val" id="statTotal">—</div><div class="stat-lbl">Alerts</div></div>
  <div class="stat"><div class="stat-val" style="color:var(--critical)" id="statCritical">—</div><div class="stat-lbl">Critical</div></div>
  <div class="stat"><div class="stat-val" style="color:var(--high)" id="statHigh">—</div><div class="stat-lbl">High</div></div>
  <div class="stat"><div class="stat-val" style="color:var(--medium)" id="statMedium">—</div><div class="stat-lbl">Medium</div></div>
  <div class="stat"><div class="stat-val" style="color:var(--low)" id="statLow">—</div><div class="stat-lbl">Low</div></div>
  <div class="stat"><div class="stat-val" style="color:var(--accent)" id="statSources">—</div><div class="stat-lbl">Sources</div></div>
</div>

<div class="filters" id="filters">
  <button class="filter-btn active" data-risk="all" onclick="setFilter('all',this)">All</button>
  <button class="filter-btn" data-risk="CRITICAL" onclick="setFilter('CRITICAL',this)">🔴 Critical</button>
  <button class="filter-btn" data-risk="HIGH" onclick="setFilter('HIGH',this)">🟠 High</button>
  <button class="filter-btn" data-risk="MEDIUM" onclick="setFilter('MEDIUM',this)">🟡 Medium</button>
  <button class="filter-btn" data-risk="LOW" onclick="setFilter('LOW',this)">🟢 Low</button>
</div>

<div class="feed" id="feed">
  <!-- Skeletons shown while loading -->
  <div id="skeletons">
    ${Array(5).fill(0).map(()=>`
    <div class="skeleton">
      <div class="skel-line w40"></div>
      <div class="skel-line w80"></div>
      <div class="skel-line w60"></div>
    </div>`).join('')}
  </div>
</div>
<div class="feed-label" id="feedLabel"></div>

<button class="refresh-btn" id="refreshBtn" onclick="loadFeeds()">
  <span id="refreshIcon">↻</span> Refresh
</button>

<script>
// ── Cairo time (UTC+3) ─────────────────────────────────────────────────────
function cairoNow() {
  return new Date(new Date().toLocaleString('en-US', { timeZone: 'Africa/Cairo' }));
}
function toCariro(date) {
  return new Date(date.toLocaleString('en-US', { timeZone: 'Africa/Cairo' }));
}
function relativeTime(date) {
  const now = cairoNow();
  const then = toCariro(date);
  const diffMs = now - then;
  const diffMin = Math.floor(diffMs / 60000);
  if (diffMin < 1)  return 'Just now';
  if (diffMin < 60) return `${diffMin} min ago`;
  const diffH = Math.floor(diffMin / 60);
  if (diffH < 24)   return `${diffH}h ago`;
  const diffD = Math.floor(diffH / 24);
  return `${diffD}d ago`;
}
function cairoTimeStr(date) {
  return date.toLocaleString('en-US', {
    timeZone: 'Africa/Cairo',
    hour: '2-digit', minute: '2-digit',
    day: '2-digit', month: 'short',
    hour12: false
  });
}

// ── Risk classification ────────────────────────────────────────────────────
const CRITICAL_KWORDS = ['tariff','sanction','ban','war','nuclear','attack','military','missile','bomb','invasion','ceasefire','strike','troops','coup','collapse','crisis','emergency'];
const HIGH_KWORDS     = ['trade','economy','tax','inflation','rate','fed','dollar','oil','gas','china','russia','iran','nato','ukraine','israel','hamas','hezbollah'];
const MEDIUM_KWORDS   = ['market','stock','deal','negotiate','diplomat','sanction','policy','congress','senate','vote'];

function classifyRisk(text) {
  const t = text.toLowerCase();
  if (CRITICAL_KWORDS.some(k => t.includes(k))) return 'CRITICAL';
  if (HIGH_KWORDS.some(k => t.includes(k)))     return 'HIGH';
  if (MEDIUM_KWORDS.some(k => t.includes(k)))   return 'MEDIUM';
  return 'LOW';
}

// ── Ticker extraction ──────────────────────────────────────────────────────
const TICKER_MAP = {
  'oil':'OIL','crude':'OIL','opec':'OIL',
  'gold':'GLD','treasury':'TLT','bond':'TLT',
  'dollar':'DXY','usd':'DXY',
  'china':'FXI','chinese':'FXI',
  'russia':'RSX','russian':'RSX',
  'iran':'OIL','ukraine':'OIL',
  'defense':'ITA','military':'ITA','weapons':'ITA','lockheed':'LMT','boeing':'BA',
  'apple':'AAPL','tech':'QQQ','nvidia':'NVDA','semiconductor':'SOXX',
  'bank':'XLF','fed':'TLT','interest rate':'TLT',
  'tariff':'DXY','trade':'SPY','economy':'SPY',
  'nasdaq':'QQQ','s&p':'SPY','dow':'DIA',
  'energy':'XLE','gas':'UNG','steel':'SLX',
  'pharma':'XPH','health':'XLV',
};
function extractTickers(text) {
  const t = text.toLowerCase();
  const found = new Set();
  for (const [kw, ticker] of Object.entries(TICKER_MAP)) {
    if (t.includes(kw)) found.add(ticker);
  }
  return [...found].slice(0, 4);
}

// ── Categories ─────────────────────────────────────────────────────────────
function extractCategory(text) {
  const t = text.toLowerCase();
  if (['war','military','troops','missile','attack','bomb','nuclear','weapon','army'].some(k=>t.includes(k))) return 'MILITARY';
  if (['tariff','trade','import','export','economy','gdp','inflation'].some(k=>t.includes(k))) return 'TRADE';
  if (['iran','russia','china','ukraine','israel','nato','hamas','hezbollah'].some(k=>t.includes(k))) return 'GEOPOLITICS';
  if (['fed','rate','bank','dollar','bond','treasury'].some(k=>t.includes(k))) return 'MONETARY';
  if (['sanction','policy','congress','senate','law','executive'].some(k=>t.includes(k))) return 'POLICY';
  return 'MARKETS';
}

// ── Accent color ───────────────────────────────────────────────────────────
function riskColor(risk) {
  return { CRITICAL: '#E53935', HIGH: '#FB8C00', MEDIUM: '#FDD835', LOW: '#66BB6A' }[risk] || '#3D8BFD';
}

// ── RSS sources ────────────────────────────────────────────────────────────
const TRUMP_FEEDS = [
  { name: 'Google News / Trump', url: 'https://news.google.com/rss/search?q=Trump+when:1d&hl=en-US&gl=US&ceid=US:en' },
  { name: 'AP via Google News',  url: 'https://news.google.com/rss/search?q=Trump+site:apnews.com&hl=en-US&gl=US&ceid=US:en' },
  { name: 'White House News',    url: 'https://www.whitehouse.gov/news/feed/' },
  { name: 'White House Actions', url: 'https://www.whitehouse.gov/presidential-actions/feed/' },
];
const FALLBACK_FEEDS = [
  { name: 'Google News / Wars & Conflicts', url: 'https://news.google.com/rss/search?q=war+conflict+ceasefire+when:1d&hl=en-US&gl=US&ceid=US:en' },
  { name: 'Google News / Middle East',      url: 'https://news.google.com/rss/search?q=Gaza+Israel+Iran+when:1d&hl=en-US&gl=US&ceid=US:en' },
  { name: 'Google News / Ukraine Russia',   url: 'https://news.google.com/rss/search?q=Ukraine+Russia+when:1d&hl=en-US&gl=US&ceid=US:en' },
  { name: 'MarketWatch',                    url: 'https://feeds.content.dowjones.io/public/rss/mw_topstories' },
  { name: 'CNBC Top News',                  url: 'https://www.cnbc.com/id/100003114/device/rss/rss.html' },
];

// CORS proxies (tried in order)
const PROXIES = [
  url => `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(url)}&api_key=&count=20`,
  url => `https://corsproxy.io/?${encodeURIComponent(url)}`,
];

// ── Fetch via rss2json ─────────────────────────────────────────────────────
async function fetchRss2json(url) {
  const endpoint = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(url)}&count=20`;
  const r = await fetch(endpoint, { signal: AbortSignal.timeout(10000) });
  if (!r.ok) throw new Error(`HTTP ${r.status}`);
  const data = await r.json();
  if (data.status !== 'ok') throw new Error(data.message || 'rss2json error');
  return (data.items || []).map(item => ({
    title:   (item.title || '').replace(/<[^>]+>/g, '').trim(),
    summary: (item.description || item.content || '').replace(/<[^>]+>/g, '').trim().slice(0, 220),
    pubDate: new Date(item.pubDate),
    link:    item.link,
    source:  data.feed?.title || url,
  }));
}

// ── Fetch via corsproxy (parse XML ourselves) ──────────────────────────────
async function fetchCorsProxy(url) {
  const proxy = `https://corsproxy.io/?${encodeURIComponent(url)}`;
  const r = await fetch(proxy, { signal: AbortSignal.timeout(12000) });
  if (!r.ok) throw new Error(`HTTP ${r.status}`);
  const text = await r.text();
  const parser = new DOMParser();
  const xml = parser.parseFromString(text, 'text/xml');
  const items = [...xml.querySelectorAll('item')];
  return items.slice(0, 20).map(item => ({
    title:   item.querySelector('title')?.textContent?.replace(/<[^>]+>/g,'').trim() || '',
    summary: (item.querySelector('description')?.textContent || '').replace(/<[^>]+>/g,'').trim().slice(0, 220),
    pubDate: new Date(item.querySelector('pubDate')?.textContent || Date.now()),
    link:    item.querySelector('link')?.textContent || '#',
    source:  xml.querySelector('channel > title')?.textContent || url,
  }));
}

async function fetchFeed(feed) {
  // Try rss2json first, then corsproxy fallback
  try { return await fetchRss2json(feed.url); } catch(e) {}
  try { return await fetchCorsProxy(feed.url); } catch(e) {}
  return [];
}

// ── State ─────────────────────────────────────────────────────────────────
let allAlerts = [];
let activeFilter = 'all';
let usingFallback = false;

function setFilter(risk, btn) {
  activeFilter = risk;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderAlerts();
}

function renderAlerts() {
  const feed = document.getElementById('feed');
  const visible = activeFilter === 'all'
    ? allAlerts
    : allAlerts.filter(a => a.risk === activeFilter);

  if (!visible.length) {
    feed.innerHTML = '<div class="status-msg">No alerts for this filter.</div>';
    return;
  }

  feed.innerHTML = visible.map(a => `
    <div class="card" onclick="window.open('${a.link}','_blank')">
      <div class="card-accent" style="background:${riskColor(a.risk)}"></div>
      <div class="card-body">
        <div class="card-top">
          <div class="card-title">${escHtml(a.title)}</div>
          <div class="risk-pill risk-${a.risk}">${a.risk}</div>
        </div>
        <div class="card-source">
          <div class="source-dot"></div>
          ${escHtml(a.source)} · ${escHtml(a.category)}
        </div>
        ${a.summary ? `<div class="card-summary">${escHtml(a.summary)}</div>` : ''}
        <div class="card-footer">
          <div class="tickers">${a.tickers.map(t=>`<span class="ticker">${t}</span>`).join('')}</div>
          <div class="card-time" title="${cairoTimeStr(a.pubDate)} Cairo">
            🕐 ${relativeTime(a.pubDate)} · Cairo
          </div>
        </div>
      </div>
    </div>
  `).join('');
}

function updateStats() {
  const counts = { CRITICAL: 0, HIGH: 0, MEDIUM: 0, LOW: 0 };
  const sources = new Set();
  allAlerts.forEach(a => { counts[a.risk]++; sources.add(a.source); });
  document.getElementById('statTotal').textContent    = allAlerts.length;
  document.getElementById('statCritical').textContent = counts.CRITICAL;
  document.getElementById('statHigh').textContent     = counts.HIGH;
  document.getElementById('statMedium').textContent   = counts.MEDIUM;
  document.getElementById('statLow').textContent      = counts.LOW;
  document.getElementById('statSources').textContent  = sources.size;
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Main load ─────────────────────────────────────────────────────────────
async function loadFeeds() {
  const btn  = document.getElementById('refreshBtn');
  const icon = document.getElementById('refreshIcon');
  const feed = document.getElementById('feed');
  const label = document.getElementById('feedLabel');

  btn.disabled = true;
  icon.classList.add('spin');

  // Show skeletons
  feed.innerHTML = Array(5).fill(0).map(()=>`
    <div class="skeleton">
      <div class="skel-line w40"></div>
      <div class="skel-line w80"></div>
      <div class="skel-line w60"></div>
    </div>`).join('');
  label.textContent = '';

  let items = [];
  usingFallback = false;

  // ── Try Trump feeds first ──────────────────────────────────────────────
  const trumpResults = await Promise.allSettled(TRUMP_FEEDS.map(fetchFeed));
  trumpResults.forEach(r => { if (r.status === 'fulfilled') items.push(...r.value); });

  // Filter: must mention Trump or be from White House
  const trumpItems = items.filter(it =>
    /trump|white house|president|tariff|maga|mar-a-lago/i.test(it.title + it.summary)
  );

  if (trumpItems.length >= 3) {
    items = trumpItems;
    label.textContent = `✅ Showing Trump news — fetched ${items.length} stories`;
  } else {
    // ── Fallback: wars / conflicts ───────────────────────────────────────
    usingFallback = true;
    items = [];
    const fallbackResults = await Promise.allSettled(FALLBACK_FEEDS.map(fetchFeed));
    fallbackResults.forEach(r => { if (r.status === 'fulfilled') items.push(...r.value); });
    label.textContent = `⚠️ No Trump news found — showing wars & conflicts worldwide (${items.length} stories)`;
  }

  if (!items.length) {
    feed.innerHTML = '<div class="status-msg error">⚠️ Could not reach any news feeds. Check your internet connection.</div>';
    btn.disabled = false; icon.classList.remove('spin');
    return;
  }

  // ── Deduplicate by title ───────────────────────────────────────────────
  const seen = new Set();
  items = items.filter(it => {
    const key = it.title.toLowerCase().slice(0, 60);
    if (seen.has(key)) return false;
    seen.add(key); return true;
  });

  // ── Enrich + sort by date desc ─────────────────────────────────────────
  allAlerts = items.map(it => ({
    ...it,
    risk:     classifyRisk(it.title + ' ' + it.summary),
    tickers:  extractTickers(it.title + ' ' + it.summary),
    category: extractCategory(it.title + ' ' + it.summary),
  })).sort((a, b) => b.pubDate - a.pubDate).slice(0, 50);

  updateStats();
  renderAlerts();

  btn.disabled = false;
  icon.classList.remove('spin');
}

// ── Auto-refresh every 90 seconds ─────────────────────────────────────────
loadFeeds();
setInterval(loadFeeds, 90_000);
</script>
</body>
</html>
